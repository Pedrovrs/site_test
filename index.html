<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Um projeto de landing page para a MizdraCode">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
    <title>MizdraCode</title>
    <style>

        body{
            background-color: azure;

        }

        main{
            background-color:azure;
            padding: 20px;
            min-width: 280px;
            max-width: 800px;
            margin: auto;
        }

        img{
            width: 100%;
        }

        footer{
            padding: 20px;

            min-width: 280px;
            max-width: 800px;
            margin: auto;
        }
    </style>
</head>
<body>
    <header class="cabecalho">
        <nav class="menu">
            <a class="item" href="https://rpubs.com/eco_vrs"><strong>Meu Rpubs</strong></a>
            <a class="item2" href="https://www.instagram.com/pedrovrs.eco/">
                <i class="uil uil-instagram"></i>
            </a>
        </nav>
       
    </header>

    <main class="conteudo">
        <section class="principal">
            <div class="escrita">
                <h1 class="escrita-titulo">Mizdra Code</h1>
                <h2 class="escrita-subtitulo">Logo criada com intuito de exercitar a criatividade e aprender a utilizar novas ferramentas. </h2>
                <a href="https://www.linkedin.com/in/pedro-vrs/"><button class="meu-link">Me acompanhe !</button></a>
            </div>
           <picture>
               <source media="(max-widht: 800px)" srcset="logo.svg">
               <img class="logo-mizdra" src="logo.svg" alt="Imagem do Mizdra">
           </picture>
            
        </section>

        <section class="conteudo-secundario">
            <h3 class="titulo-segundario">Ferramentas utilizada para o desenvolvimento deste projeto:</h3>
            <p class="conteudo-paragrafo">1. HTML</p>
            <p class="conteudo-paragrafo">2. CSS</p>
            <p class="conteudo-paragrafo">3. Figma</p>
            <p class="conteudo-paragrafo">4. Photoshop</p>
        </section>

        <!-- <section>
            <ul>
                <li class="conteudo-paragrafo">HTML</li>
                <li class="conteudo-paragrafo">CSS</li>
                <li class="conteudo-paragrafo">FIGMA</li>
                <li class="conteudo-paragrafo">PHOTOSHOP</li>
            </ul>
        </section> -->

    </main>
    
    <footer class="rodape">
        <h5 class="rodape-credito">créditos: pensado e criado por Pedro Vinícius e André Ramiro.</h5>
    </footer>

</html>
